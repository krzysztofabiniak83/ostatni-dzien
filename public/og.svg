<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g1" cx="20%" cy="10%" r="50%">
      <stop offset="0%" stop-color="#1F3D33" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1F3D33" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#B85C3C" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#B85C3C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#F5F3EE"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <text x="100" y="170"
        font-family="'Geist Mono', ui-monospace, monospace"
        font-size="22" letter-spacing="3"
        fill="#9AA09C">OSTATNI DZIEŃ</text>

  <text x="100" y="320"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="120" font-weight="300" fill="#0D1F1A">
    Koniec niechcianych
  </text>
  <text x="100" y="450"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="120" font-style="italic" font-weight="300" fill="#1F3D33">
    opłat
  </text>

  <text x="100" y="540"
        font-family="-apple-system, 'Helvetica Neue', sans-serif"
        font-size="26" fill="#5C6661">
    Pamiętamy o trialach i odnowieniach. Anuluj zanim pobiorą środki.
  </text>

  <!-- Mały badge w prawym górnym rogu -->
  <g transform="translate(1000, 110)">
    <rect x="0" y="0" width="120" height="120" rx="28" fill="#1F3D33"/>
    <text x="60" y="92"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="92" font-style="italic" font-weight="400"
          text-anchor="middle" fill="#F5F3EE">o</text>
  </g>
</svg>
